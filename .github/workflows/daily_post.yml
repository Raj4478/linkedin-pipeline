name: Daily LinkedIn Dev Content

on:
  schedule:
    # 9 AM IST = 3:30 AM UTC
    - cron: '30 3 * * 1-5'
    # 1 PM IST = 7:30 AM UTC
    - cron: '30 7 * * 1-5'
    # 6 PM IST = 12:30 PM UTC
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Content niche'
        required: false
        default: 'system_design'
        type: choice
        options:
          - system_design
          - webdev
          - career
      topic:
        description: 'Specific topic (leave empty for auto)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx pydantic pydantic-settings python-dotenv -q

      - name: Create folders
        run: mkdir -p logs data

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
        run: |
          NICHE="${{ github.event.inputs.niche || 'system_design' }}"
          TOPIC="${{ github.event.inputs.topic || '' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          # Auto-rotate niches on schedule
          HOUR=$(TZ=Asia/Kolkata date +%H)
          if [ -z "${{ github.event.inputs.niche }}" ]; then
            if [ "$HOUR" -lt 11 ]; then
              NICHE="system_design"
            elif [ "$HOUR" -lt 15 ]; then
              NICHE="webdev"
            else
              NICHE="career"
            fi
          fi

          echo "Posting: niche=$NICHE topic=$TOPIC dry_run=$DRY_RUN"

          CMD="python -m src.pipeline --niche $NICHE"
          [ -n "$TOPIC" ] && CMD="$CMD --topic \"$TOPIC\""
          [ "$DRY_RUN" = "true" ] && CMD="$CMD --dry-run"
          eval $CMD

      - name: Save topic tracker
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "Last run: $(TZ=Asia/Kolkata date '+%d %b %Y %I:%M %p IST')" > .last_run
          git add .last_run data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update topic tracker [skip ci]"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
